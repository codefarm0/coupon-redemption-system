spring:
  application:
    name: coupon-service

  datasource:
    url: jdbc:mysql://localhost:3306/coupon_db
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

coupon:
  lock:
    enabled: true
  instance:
    name: coupon-app-1

server:
  port: 8085
